name: Deploy Tenant Instance

on:
  push:
    branches:
      - main
    paths:
      - "apps/tenant-instance/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-tenant-instance.yml"
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Skip Docker build cache"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@71fee32a0bb7e97b4d33d548e7d957010649d8fa # v2.1.3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_ARTIFACT_REGISTRY_DOMAIN }} --quiet

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Prune for Docker
        run: npx turbo prune @vendin/tenant-instance --docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and Push Docker image
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          file: ./apps/tenant-instance/Dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_ARTIFACT_REGISTRY_DOMAIN }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}/tenant-instance:latest
            ${{ secrets.GCP_ARTIFACT_REGISTRY_DOMAIN }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}/tenant-instance:${{ github.sha }}
            ${{ secrets.GCP_ARTIFACT_REGISTRY_DOMAIN }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}/tenant-instance:internal
          cache-from: ${{ github.event.inputs.skip_cache == 'true' && '' || 'type=gha,scope=tenant-instance' }}
          cache-to: ${{ github.event.inputs.skip_cache == 'true' && '' || 'type=gha,mode=max,scope=tenant-instance' }}
          platforms: linux/amd64

      - name: Trigger Demo Store Upgrade
        if: github.ref == 'refs/heads/main'
        env:
          STAGING_CONTROL_PLANE_URL: ${{ secrets.STAGING_CONTROL_PLANE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          IMAGE_TAG: ${{ secrets.GCP_ARTIFACT_REGISTRY_DOMAIN }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}/tenant-instance:${{ github.sha }}
        run: |
          echo "Triggering upgrade campaign for demo store on 'internal' channel..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$STAGING_CONTROL_PLANE_URL/internal/campaigns" \
            -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"targetImageTag\": \"$IMAGE_TAG\", \"channelId\": \"internal\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$ d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully triggered upgrade campaign."
            echo "$BODY"
          else
            echo "Failed to trigger upgrade campaign. HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
