name: Manage Demo Store

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - provision
          - seed
          - reset
        default: "provision"

jobs:
  manage:
    name: Manage Demo Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Action
        env:
          STAGING_CONTROL_PLANE_URL: ${{ secrets.STAGING_CONTROL_PLANE_URL }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.action }}" = "provision" ]; then
            pnpm run staging:demo:provision
          elif [ "${{ github.event.inputs.action }}" = "seed" ]; then
            pnpm run staging:demo:seed
          elif [ "${{ github.event.inputs.action }}" = "reset" ]; then
            pnpm run staging:demo:reset
          fi
